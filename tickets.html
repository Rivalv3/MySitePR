<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Купить билеты - Концертный зал "Гармония"</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333333;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        header {
            background-color: #4a90d9;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 16px;
        }
        nav a:hover {
            color: #4a90d9;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
        }
        h2 {
            color: #4a90d9;
        }
        form {
            background-color: #f9f9f9;
            padding: 20px;
            border: 1px solid #ccc;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            height: 80px;
        }
        button {
            background-color: #4a90d9;
            color: white;
            padding: 12px 30px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #357abd;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Покупка билетов</h1>
    </header>

    <nav>
        <a href="index.html">Главная</a>
        <a href="schedule.html">Афиша</a>
        <a href="tickets.html">Купить билеты</a>
    </nav>

    <div class="container">
        <h2>Оформление заказа</h2>

        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Ваше имя:</label>
                <input type="text" id="name" name="name" placeholder="Иванов Иван" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="example@mail.ru" required>
            </div>

            <div class="form-group">
                <label for="phone">Телефон:</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" required>
            </div>

            <div class="form-group">
                <label for="event">Выберите мероприятие:</label>
                <select id="event" name="event" required>
                    <option value="">-- Выберите концерт --</option>
                    <option value="symphony">Симфонический вечер (25 декабря)</option>
                    <option value="jazz">Вечер джаза (28 декабря)</option>
                    <option value="guitar">Фестиваль гитарной музыки (5 января)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">Категория билета:</label>
                <select id="category" name="category" required>
                    <option value="">-- Выберите категорию --</option>
                    <option value="parter">Партер - 2500 ₽</option>
                    <option value="balcony">Балкон - 1800 ₽</option>
                    <option value="amphitheater">Амфитеатр - 1200 ₽</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">Количество:</label>
                <select id="quantity" name="quantity" required>
                    <option value="1">1 билет</option>
                    <option value="2">2 билета</option>
                    <option value="3">3 билета</option>
                    <option value="4">4 билета</option>
                </select>
            </div>

            <div class="form-group">
                <label for="payment">Способ оплаты:</label>
                <select id="payment" name="payment" required>
                    <option value="">-- Выберите способ --</option>
                    <option value="card">Банковская карта</option>
                    <option value="sbp">СБП</option>
                    <option value="cash">Наличными в кассе</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comments">Комментарии:</label>
                <textarea id="comments" name="comments" placeholder="Пожелания по местам..."></textarea>
            </div>

            <button type="submit">Оформить заказ</button>
        </form>

        <h3>Информация:</h3>
        <ul>
            <li>Билеты необходимо получить за 1 час до концерта</li>
            <li>При себе иметь документ, удостоверяющий личность</li>
            <li>Возврат билетов возможен за 3 дня до мероприятия</li>
        </ul>
    </div>

    <footer>
        <p>© 2024 Концертный зал "Гармония"</p>
        <p>Телефон: +7 (495) 123-45-67</p>
    </footer>
</body>
</html>
